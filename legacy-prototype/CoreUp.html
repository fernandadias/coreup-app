<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CoreUp</title>
<link rel="stylesheet" href="styles.css">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<script>
  (function(){
    var p = new URLSearchParams(location.search);
    var tab = p.get('tab');
    if (tab) localStorage.setItem('coreup:tab', tab);
  })();
</script>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="charts.jsx"></script>
<script type="text/babel" src="screen-home.jsx"></script>
<script type="text/babel" src="screen-workouts.jsx"></script>
<script type="text/babel" src="screen-execute.jsx"></script>
<script type="text/babel" src="screen-evolution.jsx"></script>
<script type="text/babel" src="screen-achievements.jsx"></script>
<script type="text/babel" src="screen-profile.jsx"></script>

<script type="text/babel" data-presets="react">
const TabBar = ({ active, onChange }) => {
  const tabs = [
    { id: 'home', label: 'Home', icon: IconHome },
    { id: 'workouts', label: 'Treinos', icon: IconDumbbell },
    { id: 'evolution', label: 'Evolução', icon: IconTrendingUp },
    { id: 'achievements', label: 'Medalhas', icon: IconTrophy },
    { id: 'profile', label: 'Perfil', icon: IconUser },
  ];
  return (
    <div className="tab-bar">
      {tabs.map(t => {
        const I = t.icon;
        return (
          <button
            key={t.id}
            className={`tab-btn ${active === t.id ? 'active' : ''}`}
            onClick={() => onChange(t.id)}
          >
            <I size={22} strokeWidth={active === t.id ? 2 : 1.75} />
            <span>{t.label}</span>
          </button>
        );
      })}
    </div>
  );
};

function App() {
  const [tab, setTab] = React.useState(() => localStorage.getItem('coreup:tab') || 'home');
  const [executing, setExecuting] = React.useState(() => new URLSearchParams(location.search).get('exec') === '1');

  React.useEffect(() => { localStorage.setItem('coreup:tab', tab); }, [tab]);

  const screens = {
    home: <HomeScreen onStartWorkout={() => setExecuting(true)} onNavigate={setTab} />,
    workouts: <WorkoutsScreen onStartWorkout={() => setExecuting(true)} />,
    evolution: <EvolutionScreen />,
    achievements: <AchievementsScreen />,
    profile: <ProfileScreen />,
  };

  const phoneW = 402;
  const phoneH = 874;

  return (
    <div style={{
      minHeight: '100vh',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: 40,
      background: 'radial-gradient(ellipse at 50% 0%, #14141a, #09090B 60%)',
      position: 'relative', overflow: 'hidden',
    }}>
      {/* Subtle bg noise */}
      <div className="noise" />

      <IOSDevice width={phoneW} height={phoneH} dark>
        {executing ? (
          <ExecuteScreen onExit={() => setExecuting(false)} />
        ) : (
          <React.Fragment>
            {screens[tab]}
            <TabBar active={tab} onChange={setTab} />
          </React.Fragment>
        )}
      </IOSDevice>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
